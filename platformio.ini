; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

board_build.partitions = huge_app.csv

board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
build_src_filter = +<0_master/*> -<1_slave_arm/*> -<2_slave_wheel/*>

build_flags =
    -O2
    -D CORE_DEBUG_LEVEL=0

monitor_speed = 115200

lib_deps = 
    https://github.com/rodneybakiskan/ps5-esp32

[env:blackpill_arm]
platform = ststm32
board = blackpill_f411ce
framework = arduino
monitor_speed = 115200
build_src_filter = +<1_slave_arm/*> -<0_master/*> -<2_slave_wheel/*>
upload_protocol = stlink
extra_scripts = post:scripts/skip_size_check.py

build_flags =
    -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC
    -D USBCON

[env:blackpill_wheel]
platform = ststm32
board = blackpill_f411ce
framework = arduino
monitor_speed = 115200
build_src_filter = +<2_slave_wheel/*> -<0_master/*> -<1_slave_arm/*>
upload_protocol = stlink
extra_scripts = post:scripts/skip_size_check.py

build_flags =
    -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC
    -D USBCON
